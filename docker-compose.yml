services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: video_jobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/video_jobs
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      HF_PROVIDER: fal-ai
      HF_MODEL: Wan-AI/Wan2.2-TI2V-5B
      VIDEO_STORAGE: local
      LOCAL_VIDEO_DIR: /app/data/videos
      # HF_TOKEN: set via env/secret manager
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info", "-Q", "video_generation"]
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/video_jobs
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      HF_PROVIDER: fal-ai
      HF_MODEL: Wan-AI/Wan2.2-TI2V-5B
      VIDEO_STORAGE: local
      LOCAL_VIDEO_DIR: /app/data/videos
      # HF_TOKEN: set via env/secret manager
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:

