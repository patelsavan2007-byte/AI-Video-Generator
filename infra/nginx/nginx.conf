upstream api_upstream {
    server api:8000;
}

upstream frontend_upstream {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # ── Static media — served by Nginx directly (zero FastAPI overhead) ──
    # The media_vol Docker volume is bind-mounted into Nginx at /media.
    location /media/ {
        alias /media/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
        sendfile on;
        tcp_nopush on;
    }

    # ── API ──
    location /api/ {
        proxy_pass http://api_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support long-running streaming uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }

    # ── Frontend (Next.js dev server or prod) ──
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";   # WebSocket / HMR support
        proxy_http_version 1.1;
    }
}
